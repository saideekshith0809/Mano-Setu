<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ManoSetu - Loading Dashboard...</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sora', sans-serif;
            background: #f8f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #64748b;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #7c3aed;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('x-session-token');
            if (!token) {
                window.location.href = '/auth.html';
                return;
            }
            const role = localStorage.getItem('manosetu-role') || 'user';
            
            setTimeout(() => {
                if (role === 'admin') {
                    window.location.href = '/ngo-dashboard.html';
                } else if (role === 'doctor') {
                    window.location.href = '/doctor-dashboard.html';
                } else {
                    window.location.href = '/user-dashboard.html';
                }
            }, 500); // Tiny artificial delay for smooth transition 
        });
    </script>
<script src="/i18n.js"></script>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 16px;"></div>
        <p>Loading your space...</p>
    </div>






</body>
</html>
